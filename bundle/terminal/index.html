<!doctype html>
<!--
  os://terminal — Soliloquy terminal landing page.

  Architecture:
    1. ghostty-vt.wasm  — libghostty VT state machine (terminal grid, VT/ANSI parsing)
    2. Canvas renderer  — JS reads cell state from WASM, paints to <canvas>
    3. PTY WebSocket    — sold /v1/term/session bridge → shell (zellij or ash)

  Build ghostty-vt.wasm:
    ./scripts/build-ghostty-wasm.sh
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>os://terminal</title>
  <style>
    :root {
      color-scheme: dark;
      --chrome-height: 0px;
      --bg: #000000;
      --fg: #ffffff;
      --cursor: #ffffff;
      --chrome: #000000;
      --line: rgba(255,255,255,0.14);
      --selection: rgba(255,255,255,0.16);
      --font: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      --font-size: 14px;
      --line-height: 1.4;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    #terminal-canvas {
      display: block;
      position: absolute;
      top: var(--chrome-height, 42px);
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: auto;
      cursor: text;
      outline: 0;
    }

    #browser-bar {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 42px;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 0 14px;
      background: var(--chrome);
      box-shadow: var(--line) 0px 0px 0px 1px;
      font-family: Geist, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    .traffic {
      display: flex;
      gap: 7px;
    }

    .traffic span {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #000;
      box-shadow: var(--line) 0px 0px 0px 1px;
    }

    #address {
      min-width: 0;
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 6px;
      background: #000;
      box-shadow: var(--line) 0px 0px 0px 1px;
      color: var(--fg);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #window-state {
      font-size: 11px;
      color: #a3a3a3;
      letter-spacing: 0;
      text-transform: none;
    }

    /* Fallback pre-canvas text output when WASM unavailable */
    #terminal-fallback {
      display: none;
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 12px 16px;
      font-family: var(--font);
      font-size: var(--font-size);
      line-height: var(--line-height);
      color: var(--fg);
      background: var(--bg);
      overflow: auto;
      white-space: pre;
    }

    #status-bar {
      display: none; /* keep hidden for minimal appliance chrome */
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22px;
      padding: 0 12px;
      align-items: center;
      justify-content: space-between;
      background: #000;
      box-shadow: var(--line) 0px 0px 0px 1px;
      font-family: var(--font);
      font-size: 11px;
      color: #a3a3a3;
      letter-spacing: 0;
      pointer-events: none;
    }

    #software-cursor {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 24px;
      transform: translate(-1px, -1px);
      pointer-events: none;
      z-index: 10;
      filter: drop-shadow(0 1px 2px rgba(255,255,255,0.28));
    }

    #software-cursor::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 22px 15px;
      border-color: transparent transparent #fff transparent;
    }

    #software-cursor::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 5px;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 13px 9px;
      border-color: transparent transparent #000 transparent;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="browser-bar">
    <div class="traffic"><span></span><span></span><span></span></div>
    <div id="address">os://terminal</div>
    <div id="window-state">Live</div>
  </div>
  <canvas id="terminal-canvas" tabindex="0"></canvas>
  <pre id="terminal-fallback" aria-live="polite"></pre>
  <div id="status-bar">
    <span id="status-left">os://terminal</span>
    <span id="status-right">connecting…</span>
  </div>
  <div id="software-cursor" aria-hidden="true"></div>

  <script type="module">
    // ── config ────────────────────────────────────────────────────────────────
    const API_BASE  = window.__SOL_API_BASE__ ?? 'http://127.0.0.1:8080';
    const API_TOKEN = window.__SOL_TOKEN__    ?? '';
    const WASM_URL  = '/terminal/ghostty-vt.wasm';

    // ── font metrics (used for cell sizing) ──────────────────────────────────
    const FONT        = getComputedStyle(document.documentElement)
                          .getPropertyValue('--font').trim();
    const FONT_SIZE   = parseInt(
      getComputedStyle(document.documentElement).getPropertyValue('--font-size'), 10
    );
    const LINE_HEIGHT = parseFloat(
      getComputedStyle(document.documentElement).getPropertyValue('--line-height')
    );

    function measureCell(ctx) {
      ctx.font = `${FONT_SIZE}px ${FONT}`;
      const m = ctx.measureText('M');
      return {
        w: Math.ceil(m.width),
        h: Math.ceil(FONT_SIZE * LINE_HEIGHT),
      };
    }

    // ── canvas terminal renderer ──────────────────────────────────────────────
    class CanvasTerminal {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx    = canvas.getContext('2d');
        this.cell   = measureCell(this.ctx);
        this.cols   = 80;
        this.rows   = 24;
        this.resize();

        // Cell buffer: array of { char, fg, bg, bold, underline }
        this.cells  = this._blankCells();
        this.cursorCol = 0;
        this.cursorRow = 0;

        window.addEventListener('resize', () => this.resize());
      }

      resize() {
        const dpr  = window.devicePixelRatio || 1;
        const w    = this.canvas.clientWidth;
        const h    = this.canvas.clientHeight;
        this.canvas.width  = w * dpr;
        this.canvas.height = h * dpr;
        this.ctx.setTransform(1, 0, 0, 1, 0, 0);
        this.ctx.scale(dpr, dpr);
        this.cols = Math.max(1, Math.floor(w / this.cell.w));
        this.rows = Math.max(1, Math.floor(h / this.cell.h));
        this.cells = this._blankCells();
        this.onResize?.(this.cols, this.rows);
      }

      _blankCells() {
        return Array.from({ length: this.rows }, () =>
          Array.from({ length: this.cols }, () => ({
            char: ' ', fg: '#ffffff', bg: '#000000',
            bold: false, underline: false,
          }))
        );
      }

      // Feed raw VT bytes as string (from PTY WebSocket)
      feedVt(text) {
        // Simple ANSI parser — handles printable chars + basic SGR/cursor CSIs.
        // When ghostty-vt.wasm is loaded, this is replaced by the WASM VT path.
        let i = 0;
        while (i < text.length) {
          const ch = text[i];
          if (ch === '\x1b') {
            i++;
            if (text[i] === '[') {         // CSI
              i++;
              let params = '';
              while (i < text.length && /[\d;]/.test(text[i])) params += text[i++];
              const cmd = text[i++] ?? '';
              this._handleCSI(params, cmd);
            } else {
              i++;                          // skip unknown ESC seq
            }
          } else if (ch === '\r') {
            this.cursorCol = 0; i++;
          } else if (ch === '\n') {
            this.cursorRow++;
            if (this.cursorRow >= this.rows) { this._scrollUp(); this.cursorRow = this.rows - 1; }
            i++;
          } else if (ch === '\b') {
            if (this.cursorCol > 0) this.cursorCol--;
            i++;
          } else if (ch >= ' ') {
            this._putChar(ch);
            i++;
          } else {
            i++;
          }
        }
        this.paint();
      }

      _handleCSI(params, cmd) {
        const nums = params.split(';').map(n => parseInt(n || '0', 10));
        switch (cmd) {
          case 'A': this.cursorRow = Math.max(0, this.cursorRow - (nums[0] || 1)); break;
          case 'B': this.cursorRow = Math.min(this.rows - 1, this.cursorRow + (nums[0] || 1)); break;
          case 'C': this.cursorCol = Math.min(this.cols - 1, this.cursorCol + (nums[0] || 1)); break;
          case 'D': this.cursorCol = Math.max(0, this.cursorCol - (nums[0] || 1)); break;
          case 'H': case 'f': // cursor position
            this.cursorRow = Math.max(0, (nums[0] || 1) - 1);
            this.cursorCol = Math.max(0, (nums[1] || 1) - 1);
            break;
          case 'J': this._eraseDisplay(nums[0] || 0); break;
          case 'K': this._eraseLine(nums[0] || 0);    break;
          // SGR ignored in fallback (colors rendered as default)
        }
      }

      _putChar(ch) {
        if (this.cursorRow < this.rows && this.cursorCol < this.cols) {
          this.cells[this.cursorRow][this.cursorCol].char = ch;
        }
        this.cursorCol++;
        if (this.cursorCol >= this.cols) { this.cursorCol = 0; this.cursorRow++; }
        if (this.cursorRow >= this.rows) { this._scrollUp(); this.cursorRow = this.rows - 1; }
      }

      _scrollUp() {
        this.cells.shift();
        this.cells.push(Array.from({ length: this.cols }, () => ({
          char: ' ', fg: '#ffffff', bg: '#000000',
          bold: false, underline: false,
        })));
      }

      _eraseDisplay(mode) {
        if (mode === 2 || mode === 3) this.cells = this._blankCells();
      }

      _eraseLine(mode) {
        const row = this.cells[this.cursorRow];
        if (!row) return;
        const blank = () => ({ char: ' ', fg: '#ffffff', bg: '#000000', bold: false, underline: false });
        if (mode === 0) for (let c = this.cursorCol; c < this.cols; c++) row[c] = blank();
        else if (mode === 1) for (let c = 0; c <= this.cursorCol; c++) row[c] = blank();
        else if (mode === 2) for (let c = 0; c < this.cols; c++) row[c] = blank();
      }

      paint() {
        const { ctx, cell, cols, rows, cells, cursorCol, cursorRow } = this;
        const W = this.canvas.width  / (window.devicePixelRatio || 1);
        const H = this.canvas.height / (window.devicePixelRatio || 1);

        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, W, H);
        ctx.font = `${FONT_SIZE}px ${FONT}`;
        ctx.textBaseline = 'top';

        for (let r = 0; r < rows; r++) {
          const rowData = cells[r];
          if (!rowData) continue;
          const y = r * cell.h;
          for (let c = 0; c < cols; c++) {
            const cellData = rowData[c];
            if (!cellData) continue;
            const x = c * cell.w;
            const isCursor = r === cursorRow && c === cursorCol;

            // Background
            ctx.fillStyle = isCursor ? '#ffffff' : cellData.bg;
            ctx.fillRect(x, y, cell.w, cell.h);

            // Character
            if (cellData.char !== ' ') {
              ctx.fillStyle = isCursor ? '#000000' : cellData.fg;
              if (cellData.bold) ctx.font = `bold ${FONT_SIZE}px ${FONT}`;
              ctx.fillText(cellData.char, x, y + 1);
              if (cellData.bold) ctx.font = `${FONT_SIZE}px ${FONT}`;
              if (cellData.underline) {
                ctx.fillStyle = cellData.fg;
                ctx.fillRect(x, y + cell.h - 2, cell.w, 1);
              }
            }
          }
        }
      }
    }

    // ── ghostty-vt WASM loader ────────────────────────────────────────────────
    async function loadGhosttyWasm() {
      try {
        const resp = await fetch(WASM_URL);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const bytes  = await resp.arrayBuffer();
        const result = await WebAssembly.instantiate(bytes, {
          env: {
            log: (ptr, len) => {
              const mem   = result.instance.exports.memory;
              const bytes = new Uint8Array(mem.buffer, ptr, len);
              console.log('[ghostty-vt]', new TextDecoder().decode(bytes));
            },
          },
        });
        return result.instance;
      } catch (err) {
        console.warn('[ghostty-vt] WASM unavailable, using JS fallback:', err.message);
        return null;
      }
    }

    // ── GhosttyVtBridge: wraps WASM terminal or falls back to JS renderer ─────
    class GhosttyVtBridge {
      constructor(wasmInstance, renderer) {
        this.wasm     = wasmInstance;
        this.renderer = renderer;
        this.termPtr  = null;
        this.typeLayout = null;
        this.GHOSTTY_SUCCESS = 0;

        if (wasmInstance) {
          this._loadTypeLayout();
          this._createTerminal(renderer.cols, renderer.rows);
          renderer.onResize = (cols, rows) => this._resizeTerminal(cols, rows);
        }
      }

      _loadTypeLayout() {
        try {
          const mem     = this.wasm.exports.memory;
          const jsonPtr = this.wasm.exports.ghostty_type_json();
          const raw     = new Uint8Array(mem.buffer, jsonPtr, mem.buffer.byteLength - jsonPtr);
          const str     = new TextDecoder().decode(raw).split('\0')[0];
          this.typeLayout = JSON.parse(str);
        } catch (e) {
          console.warn('[ghostty-vt] could not load type layout:', e);
          this.wasm = null;
        }
      }

      _fieldInfo(structName, fieldName) {
        return this.typeLayout[structName]?.fields?.[fieldName];
      }

      _setField(view, structName, fieldName, value) {
        const f = this._fieldInfo(structName, fieldName);
        if (!f) return;
        switch (f.type) {
          case 'u8':  case 'bool': view.setUint8(f.offset, value); break;
          case 'u16': view.setUint16(f.offset, value, true); break;
          case 'u32': case 'enum': view.setUint32(f.offset, value, true); break;
          case 'u64': view.setBigUint64(f.offset, BigInt(value), true); break;
        }
      }

      _createTerminal(cols, rows) {
        if (!this.wasm || !this.typeLayout) return;
        try {
          const exports = this.wasm.exports;
          const mem     = exports.memory;
          const OPTS_SIZE = this.typeLayout['GhosttyTerminalOptions'].size;
          const optsPtr   = exports.ghostty_wasm_alloc_u8_array(OPTS_SIZE);
          new Uint8Array(mem.buffer, optsPtr, OPTS_SIZE).fill(0);
          const view = new DataView(mem.buffer, optsPtr, OPTS_SIZE);
          this._setField(view, 'GhosttyTerminalOptions', 'cols', cols);
          this._setField(view, 'GhosttyTerminalOptions', 'rows', rows);
          this._setField(view, 'GhosttyTerminalOptions', 'max_scrollback', 10000);

          const ptrPtr = exports.ghostty_wasm_alloc_opaque();
          const result = exports.ghostty_terminal_new(0, ptrPtr, optsPtr);
          exports.ghostty_wasm_free_u8_array(optsPtr, OPTS_SIZE);

          if (result !== this.GHOSTTY_SUCCESS) {
            console.warn('[ghostty-vt] ghostty_terminal_new failed:', result);
            exports.ghostty_wasm_free_opaque(ptrPtr);
            this.wasm = null;
            return;
          }

          this.termPtr = new DataView(mem.buffer).getUint32(ptrPtr, true);
          exports.ghostty_wasm_free_opaque(ptrPtr);
          console.log('[ghostty-vt] terminal created', cols, 'x', rows);
        } catch (e) {
          console.warn('[ghostty-vt] terminal create failed:', e);
          this.wasm = null;
        }
      }

      _resizeTerminal(cols, rows) {
        if (!this.wasm || !this.termPtr) return;
        // ghostty-vt doesn't expose a resize API yet; recreate terminal
        this._destroyTerminal();
        this._createTerminal(cols, rows);
      }

      _destroyTerminal() {
        if (this.wasm && this.termPtr) {
          this.wasm.exports.ghostty_terminal_free?.(this.termPtr);
          this.termPtr = null;
        }
      }

      // Feed raw PTY bytes.
      feedBytes(data) {
        if (this.wasm && this.termPtr) {
          this._wasmFeed(data);
        } else {
          // JS fallback renderer
          this.renderer.feedVt(typeof data === 'string' ? data : new TextDecoder().decode(data));
        }
      }

      _wasmFeed(data) {
        const exports = this.wasm.exports;
        const mem     = exports.memory;
        const bytes   = typeof data === 'string' ? new TextEncoder().encode(data) : data;
        const ptr     = exports.ghostty_wasm_alloc_u8_array(bytes.length);
        new Uint8Array(mem.buffer).set(bytes, ptr);
        exports.ghostty_terminal_vt_write(this.termPtr, ptr, bytes.length);
        exports.ghostty_wasm_free_u8_array(ptr, bytes.length);
        this._renderFromWasm();
      }

      _renderFromWasm() {
        if (!this.wasm || !this.termPtr || !this.typeLayout) return;
        try {
          // Use ghostty formatter (HTML mode) to get styled output,
          // then update renderer cells from the formatted result.
          // For now, use plain text format and drive the JS renderer.
          const exports   = this.wasm.exports;
          const mem       = exports.memory;

          const FOPTS_SIZE = this.typeLayout['GhosttyFormatterTerminalOptions'].size;
          const foptsPtr   = exports.ghostty_wasm_alloc_u8_array(FOPTS_SIZE);
          new Uint8Array(mem.buffer, foptsPtr, FOPTS_SIZE).fill(0);
          const fview = new DataView(mem.buffer, foptsPtr, FOPTS_SIZE);
          // emit = 0 (plain), trim = 1
          this._setField(fview, 'GhosttyFormatterTerminalOptions', 'size', FOPTS_SIZE);
          this._setField(fview, 'GhosttyFormatterTerminalOptions', 'emit', 0); // plain
          this._setField(fview, 'GhosttyFormatterTerminalOptions', 'trim', 0);

          // size field for extras
          const extraOff  = this._fieldInfo('GhosttyFormatterTerminalOptions', 'extra')?.offset ?? 0;
          const extraSize = this.typeLayout['GhosttyFormatterTerminalExtra']?.size ?? 0;
          const extraSzOff = this._fieldInfo('GhosttyFormatterTerminalExtra', 'size')?.offset ?? 0;
          fview.setUint32(extraOff + extraSzOff, extraSize, true);
          const screenOff  = this._fieldInfo('GhosttyFormatterTerminalExtra', 'screen')?.offset ?? 0;
          const screenSize = this.typeLayout['GhosttyFormatterScreenExtra']?.size ?? 0;
          const screenSzOff = this._fieldInfo('GhosttyFormatterScreenExtra', 'size')?.offset ?? 0;
          fview.setUint32(extraOff + screenOff + screenSzOff, screenSize, true);

          const fPtrPtr  = exports.ghostty_wasm_alloc_opaque();
          const fResult  = exports.ghostty_formatter_terminal_new(0, fPtrPtr, this.termPtr, foptsPtr);
          exports.ghostty_wasm_free_u8_array(foptsPtr, FOPTS_SIZE);

          if (fResult !== this.GHOSTTY_SUCCESS) {
            exports.ghostty_wasm_free_opaque(fPtrPtr);
            return;
          }

          const fPtr     = new DataView(mem.buffer).getUint32(fPtrPtr, true);
          exports.ghostty_wasm_free_opaque(fPtrPtr);

          const outPtrPtr = exports.ghostty_wasm_alloc_opaque();
          const outLenPtr = exports.ghostty_wasm_alloc_usize();
          const fmtResult = exports.ghostty_formatter_format_alloc(fPtr, 0, outPtrPtr, outLenPtr);

          if (fmtResult === this.GHOSTTY_SUCCESS) {
            const outPtr = new DataView(mem.buffer).getUint32(outPtrPtr, true);
            const outLen = new DataView(mem.buffer).getUint32(outLenPtr, true);
            const text   = new TextDecoder().decode(new Uint8Array(mem.buffer, outPtr, outLen));
            exports.ghostty_free?.(0, outPtr, outLen);
            // Repaint renderer by setting cell buffer from plain text lines
            this._updateCellsFromPlainText(text);
          }

          exports.ghostty_wasm_free_opaque(outPtrPtr);
          exports.ghostty_wasm_free_usize(outLenPtr);
          exports.ghostty_formatter_free(fPtr);
          this.renderer.paint();
        } catch (e) {
          console.warn('[ghostty-vt] render error:', e);
        }
      }

      _updateCellsFromPlainText(text) {
        const { renderer } = this;
        renderer.cells = renderer._blankCells();
        const lines = text.split('\n');
        for (let r = 0; r < Math.min(lines.length, renderer.rows); r++) {
          const line = lines[r];
          for (let c = 0; c < Math.min(line.length, renderer.cols); c++) {
            renderer.cells[r][c].char = line[c];
          }
        }
      }
    }

    // ── PTY WebSocket session ─────────────────────────────────────────────────
    async function createPtySession() {
      const resp = await fetch(`${API_BASE}/v1/term/session`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${API_TOKEN}`,
        },
      });
      if (!resp.ok) throw new Error(`PTY session failed: HTTP ${resp.status}`);
      const { session_id } = await resp.json();
      return session_id;
    }

    function openPtyWs(sessionId) {
      const wsBase = API_BASE.replace(/^http/, 'ws');
      const url    = `${wsBase}/v1/term/session/${sessionId}/ws?token=${encodeURIComponent(API_TOKEN)}`;
      return new WebSocket(url);
    }

    // ── keyboard → PTY ───────────────────────────────────────────────────────
    function keyToBytes(e) {
      // Translate KeyboardEvent to terminal byte sequence
      if (e.ctrlKey && !e.altKey && !e.metaKey) {
        const code = e.key.toUpperCase().charCodeAt(0) - 64;
        if (code >= 1 && code <= 26) return String.fromCharCode(code);
        if (e.key === '[') return '\x1b';
        if (e.key === '\\') return '\x1c';
        if (e.key === ']') return '\x1d';
      }
      switch (e.key) {
        case 'Enter':     return '\r';
        case 'Backspace': return '\x7f';
        case 'Tab':       return '\t';
        case 'Escape':    return '\x1b';
        case 'ArrowUp':   return '\x1b[A';
        case 'ArrowDown': return '\x1b[B';
        case 'ArrowRight':return '\x1b[C';
        case 'ArrowLeft': return '\x1b[D';
        case 'Home':      return '\x1b[H';
        case 'End':       return '\x1b[F';
        case 'PageUp':    return '\x1b[5~';
        case 'PageDown':  return '\x1b[6~';
        case 'Delete':    return '\x1b[3~';
        case 'Insert':    return '\x1b[2~';
        case 'F1':        return '\x1bOP';
        case 'F2':        return '\x1bOQ';
        case 'F3':        return '\x1bOR';
        case 'F4':        return '\x1bOS';
        default:
          if (e.key.length === 1 && !e.metaKey) return e.key;
          return null;
      }
    }

    // ── main ─────────────────────────────────────────────────────────────────
    const canvas     = document.getElementById('terminal-canvas');
    const statusLeft = document.getElementById('status-left');
    const statusRight= document.getElementById('status-right');
    const softwareCursor = document.getElementById('software-cursor');

    const renderer = new CanvasTerminal(canvas);
    canvas.focus();

    window.addEventListener('pointermove', (e) => {
      softwareCursor.style.left = `${e.clientX}px`;
      softwareCursor.style.top = `${e.clientY}px`;
    }, { passive: true });

    // Load WASM and connect PTY concurrently
    const [wasmInst, sessionId] = await Promise.allSettled([
      loadGhosttyWasm(),
      createPtySession(),
    ]).then(([w, s]) => [
      w.status === 'fulfilled' ? w.value : null,
      s.status === 'fulfilled' ? s.value : null,
    ]);

    const bridge = new GhosttyVtBridge(wasmInst, renderer);

    if (wasmInst) {
      statusLeft.textContent = 'os://terminal · ghostty-vt';
    }

    if (!sessionId) {
      const msg = '\r\n\x1b[33m[os://terminal] PTY session unavailable.\r\n'
                + 'Ensure sold is running: cargo run -p sold\r\n\x1b[0m';
      bridge.feedBytes(msg);
      statusRight.textContent = 'no PTY';
    } else {
      let ws = openPtyWs(sessionId);

      const closePtyWs = () => {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
          ws.close(1000, 'page unload');
        }
      };

      window.addEventListener('pagehide', closePtyWs);
      window.addEventListener('beforeunload', closePtyWs);

      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        statusRight.textContent = 'connected';
        // Send initial terminal size
        const cols = renderer.cols;
        const rows = renderer.rows;
        ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      };

      ws.onmessage = (e) => {
        const data = e.data instanceof ArrayBuffer
          ? new Uint8Array(e.data)
          : e.data;
        bridge.feedBytes(data);
      };

      ws.onclose = () => { statusRight.textContent = 'disconnected'; };
      ws.onerror = () => { statusRight.textContent = 'error'; };

      // Keyboard → PTY
      canvas.addEventListener('keydown', (e) => {
        e.preventDefault();
        const seq = keyToBytes(e);
        if (seq && ws.readyState === WebSocket.OPEN) ws.send(new TextEncoder().encode(seq));
      });

      // Propagate renderer resize → PTY SIGWINCH
      renderer.onResize = (cols, rows) => {
        bridge._resizeTerminal?.(cols, rows);
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      };
    }

    // Repaint cursor every 500ms
    setInterval(() => renderer.paint(), 500);
  </script>
</body>
</html>
