<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soliloquy</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08090d;
      --panel: rgba(18, 21, 28, 0.78);
      --line: rgba(255, 255, 255, 0.12);
      --text: #f4f7fb;
      --muted: rgba(244, 247, 251, 0.62);
      --accent: #7cdaff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 18% 4%, rgba(124, 218, 255, 0.16), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(186, 255, 146, 0.12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    main {
      height: 100%;
      padding: 28px;
    }

    .browser {
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: 0 30px 110px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      backdrop-filter: blur(22px);
      display: grid;
      grid-template-rows: 58px 1fr;
    }

    .chrome {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.055);
    }

    .traffic {
      display: flex;
      gap: 8px;
    }

    .traffic span {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
    }

    .address {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.26);
      color: rgba(255, 255, 255, 0.76);
      font-size: 13px;
    }

    .address::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 22px rgba(124, 218, 255, 0.8);
    }

    nav {
      display: flex;
      gap: 8px;
    }

    button {
      height: 34px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      color: rgba(255, 255, 255, 0.78);
      padding: 0 14px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #050607;
    }
  </style>
</head>
<body>
  <main>
    <section class="browser">
      <div class="chrome">
        <div class="traffic"><span></span><span></span><span></span></div>
        <div class="address" id="address">os://terminal</div>
        <nav>
          <button onclick="loadApp('terminal')">Terminal</button>
          <button onclick="loadApp('files')">Files</button>
          <button onclick="loadApp('settings')">Settings</button>
        </nav>
      </div>
      <iframe id="app-frame" src="/terminal"></iframe>
    </section>
  </main>

  <script>
    const frame = document.getElementById('app-frame');
    const address = document.getElementById('address');
    const routes = {
      terminal: ['/terminal', 'os://terminal'],
      files: ['/files.html', 'os://files'],
      settings: ['/settings.html', 'os://settings']
    };

    function loadApp(app) {
      const route = routes[app] || routes.terminal;
      frame.src = route[0];
      address.textContent = route[1];
    }
  </script>
</body>
</html>
