<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soliloquy</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: #007acc;
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav {
            display: flex;
            gap: 1rem;
        }
        .nav button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .nav button:hover {
            background: rgba(255,255,255,0.3);
        }
        .content {
            padding: 2rem;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 80px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Soliloquy Browser</h1>
        <nav class="nav">
            <button onclick="loadApp('files')">Files</button>
            <button onclick="loadApp('settings')">Settings</button>
        </nav>
    </div>
    <div class="content">
        <iframe id="app-frame" src="about:blank"></iframe>
    </div>

    <script>
        function loadApp(app) {
            const frame = document.getElementById('app-frame');
            frame.src = `/${app}.html`;
        }

        // Load default app
        window.onload = () => loadApp('files');
    </script>
</body>
</html>
