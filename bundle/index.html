<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soliloquy</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #000000;
      --text: #ffffff;
      --muted: #a3a3a3;
      --subtle: #737373;
      --line: rgba(255, 255, 255, 0.12);
      --focus: hsla(212, 100%, 48%, 1);
      --sidebar: 112px;
      --sidebar-open: 220px;
    }

    * {
      box-sizing: border-box;
      font-feature-settings: "liga";
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Geist, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      overflow: hidden;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 1px solid var(--focus);
      outline-offset: 2px;
    }

    .browser {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr;
      background: #000;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 2;
      width: var(--sidebar);
      min-width: 0;
      height: 100%;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
      padding: 10px 8px;
      background: #000;
      overflow: hidden;
      opacity: 0.72;
      transition: width 160ms ease, transform 160ms ease;
    }

    .sidebar:hover,
    .sidebar:focus-within {
      width: var(--sidebar-open);
      opacity: 1;
    }

    .command {
      position: fixed;
      top: 22px;
      right: 28px;
      z-index: 3;
      width: min(54vw, 620px);
    }

    .command input {
      width: 100%;
      height: 40px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 24px;
      font-weight: 400;
      text-align: right;
    }

    .command input::placeholder {
      color: #f5f5f5;
      opacity: 0.9;
    }

    .window-actions,
    .nav-actions,
    .app-actions {
      display: flex;
      gap: 6px;
    }

    .window-actions {
      height: 24px;
      align-items: center;
      gap: 9px;
    }

    .dot,
    .icon-button,
    .new-tab,
    .zen-toggle {
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--muted);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #1f1f1f;
    }

    .dot:hover,
    .dot:focus-visible {
      background: #fff;
      color: #000;
    }

    .dot[data-device-action="shutdown"]:hover,
    .dot[data-device-action="shutdown"]:focus-visible {
      background: #ff5b4f;
    }

    .dot[data-device-action="sleep"]:hover,
    .dot[data-device-action="sleep"]:focus-visible {
      background: #f5a524;
    }

    .dot[data-device-action="logout"]:hover,
    .dot[data-device-action="logout"]:focus-visible {
      background: #0a72ef;
    }

    .nav-actions {
      align-items: center;
    }

    .icon-button,
    .new-tab,
    .zen-toggle {
      width: 36px;
      height: 36px;
      font-size: 16px;
    }

    .icon-button:hover,
    .new-tab:hover,
    .zen-toggle:hover,
    .icon-button.active,
    .zen-toggle.active {
      background: #fff;
      color: #000;
    }

    .icon-button:disabled {
      color: #3f3f3f;
      background: transparent;
      cursor: default;
    }

    .app-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .app-actions button {
      height: 34px;
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .app-actions button:hover,
    .app-actions button.active {
      color: var(--text);
      background: transparent;
    }

    .app-label,
    .tab-title,
    .device-message {
      opacity: 0;
      transition: opacity 120ms ease;
    }

    .sidebar:hover .app-label,
    .sidebar:focus-within .app-label,
    .sidebar:hover .tab-title,
    .sidebar:focus-within .tab-title,
    .sidebar:hover .device-message,
    .sidebar:focus-within .device-message {
      opacity: 1;
    }

    .tabs {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      min-height: 38px;
      display: grid;
      grid-template-columns: 18px 1fr 24px;
      align-items: center;
      gap: 4px;
      color: var(--muted);
    }

    .tab.active {
      color: var(--text);
    }

    .tab-open,
    .tab-form {
      min-width: 0;
      height: 100%;
      display: contents;
    }

    .tab-mark {
      width: 8px;
      height: 8px;
      justify-self: center;
      border-radius: 50%;
      background: currentColor;
    }

    .tab-title,
    .tab-input {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 13px;
      font-weight: 500;
    }

    .tab-input {
      width: 100%;
      height: 30px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      opacity: 0;
      display: none;
    }

    .sidebar:hover .tab-input,
    .sidebar:focus-within .tab-input {
      opacity: 1;
      display: block;
    }

    .tab-close {
      width: 24px;
      height: 24px;
      color: var(--subtle);
      opacity: 0;
    }

    .sidebar:hover .tab-close,
    .sidebar:focus-within .tab-close {
      opacity: 1;
    }

    .tab-close:hover {
      background: #fff;
      color: #000;
    }

    .sidebar-footer {
      display: grid;
      gap: 8px;
    }

    .device-message {
      min-height: 16px;
      color: var(--subtle);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 11px;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewport {
      min-width: 0;
      min-height: 0;
      position: relative;
      background: #000;
      grid-column: 1;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #000;
    }

    .load-bar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 1px;
      background: transparent;
      pointer-events: none;
    }

    .load-bar.loading {
      background: #fff;
    }

    body.zen .sidebar {
      transform: translateX(calc(-1 * var(--sidebar)));
    }

    body.zen .sidebar:hover,
    body.zen .sidebar:focus-within {
      transform: translateX(0);
    }

    body.zen .command {
      opacity: 0;
      pointer-events: auto;
      transition: opacity 160ms ease;
    }

    body.zen .command:hover,
    body.zen .command:focus-within {
      opacity: 1;
    }

    @media (max-width: 760px) {
      :root {
        --sidebar: 58px;
        --sidebar-open: min(86vw, 280px);
      }

      .sidebar {
        padding: 8px 6px;
      }
    }
  </style>
</head>
<body>
  <main class="browser">
    <form class="command" id="command-form">
      <input id="command-input" autocomplete="off" spellcheck="false" placeholder="search">
    </form>

    <aside class="sidebar" id="sidebar">
      <div class="window-actions">
        <button class="dot" type="button" data-device-action="shutdown" aria-label="Shutdown"></button>
        <button class="dot" type="button" data-device-action="sleep" aria-label="Sleep"></button>
        <button class="dot" type="button" data-device-action="logout" aria-label="Logout"></button>
      </div>

      <div class="nav-actions">
        <button class="icon-button" id="back" type="button" aria-label="Back">‹</button>
        <button class="icon-button" id="forward" type="button" aria-label="Forward">›</button>
        <button class="icon-button" id="reload" type="button" aria-label="Reload">↻</button>
        <button class="new-tab" id="new-tab" type="button" aria-label="New tab">+</button>
      </div>

      <div class="tabs" id="tabs"></div>

      <div class="sidebar-footer">
        <nav class="app-actions" id="quick-nav">
          <button type="button" data-url="os://terminal"><span>⌁</span><span class="app-label">terminal</span></button>
          <button type="button" data-url="os://files"><span>□</span><span class="app-label">files</span></button>
          <button type="button" data-url="os://settings"><span>◌</span><span class="app-label">settings</span></button>
        </nav>
        <button class="zen-toggle" id="zen-toggle" type="button" aria-label="Zen mode">z</button>
        <div class="device-message" id="device-message">ready</div>
      </div>
    </aside>

    <section class="viewport">
      <div class="load-bar" id="load-bar"></div>
      <iframe id="app-frame" title="Soliloquy page"></iframe>
    </section>
  </main>

  <script>
    const frame = document.getElementById('app-frame');
    const tabsNode = document.getElementById('tabs');
    const backButton = document.getElementById('back');
    const forwardButton = document.getElementById('forward');
    const reloadButton = document.getElementById('reload');
    const loadBar = document.getElementById('load-bar');
    const deviceMessage = document.getElementById('device-message');
    const zenToggle = document.getElementById('zen-toggle');
    const routes = {
      'os://terminal': '/terminal',
      'os://files': '/files.html',
      'os://settings': '/settings.html'
    };

    let tabs = [];
    let activeTabId = null;

    function createTab(url) {
      const id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now());
      tabs.push({ id, title: titleFor(url), url, history: [], index: -1 });
      activeTabId = id;
      navigate(url);
    }

    function activeTab() {
      return tabs.find((tab) => tab.id === activeTabId);
    }

    function titleFor(url) {
      if (url === 'os://terminal') return 'terminal';
      if (url === 'os://files') return 'files';
      if (url === 'os://settings') return 'settings';
      try {
        return new URL(url).hostname || url;
      } catch {
        return url;
      }
    }

    function normalizeUrl(value) {
      const trimmed = value.trim();
      if (!trimmed) return 'os://terminal';
      if (routes[trimmed]) return trimmed;
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      if (/^[a-z]+:\/\//i.test(trimmed)) return trimmed;
      if (trimmed.includes('.') && !trimmed.includes(' ')) return `https://${trimmed}`;
      return `https://duckduckgo.com/?q=${encodeURIComponent(trimmed)}`;
    }

    function resolveUrl(url) {
      return routes[url] || `/browse?url=${encodeURIComponent(url)}`;
    }

    function navigate(rawUrl, options = {}) {
      const tab = activeTab();
      if (!tab) return;
      const url = normalizeUrl(rawUrl);
      if (!options.replaceHistory) {
        tab.history = tab.history.slice(0, tab.index + 1);
        tab.history.push(url);
        tab.index = tab.history.length - 1;
      } else if (tab.index >= 0) {
        tab.history[tab.index] = url;
      }
      tab.url = url;
      tab.title = titleFor(url);
      deviceMessage.textContent = `loading ${tab.title}`;
      loadBar.classList.add('loading');
      frame.src = resolveUrl(url);
      render();
    }

    function goBack() {
      const tab = activeTab();
      if (!tab || tab.index <= 0) return;
      tab.index -= 1;
      navigate(tab.history[tab.index], { replaceHistory: true });
    }

    function goForward() {
      const tab = activeTab();
      if (!tab || tab.index >= tab.history.length - 1) return;
      tab.index += 1;
      navigate(tab.history[tab.index], { replaceHistory: true });
    }

    function reload() {
      const tab = activeTab();
      if (tab) navigate(tab.url, { replaceHistory: true });
    }

    function closeTab(id) {
      if (tabs.length === 1) {
        navigate('os://terminal', { replaceHistory: true });
        return;
      }
      const index = tabs.findIndex((tab) => tab.id === id);
      tabs = tabs.filter((tab) => tab.id !== id);
      if (activeTabId === id) {
        activeTabId = tabs[Math.max(0, index - 1)].id;
        const tab = activeTab();
        navigate(tab.url, { replaceHistory: true });
      }
      render();
    }

    function setActive(id) {
      activeTabId = id;
      const tab = activeTab();
      if (tab) navigate(tab.url, { replaceHistory: true });
    }

    function render() {
      const tab = activeTab();
      tabsNode.innerHTML = '';
      for (const item of tabs) {
        const node = document.createElement('div');
        node.className = `tab${item.id === activeTabId ? ' active' : ''}`;
        if (item.id === activeTabId) {
          node.innerHTML = '<span class="tab-mark"></span><form class="tab-form"><input class="tab-input" autocomplete="off" spellcheck="false"></form><button class="tab-close" type="button" aria-label="Close tab">×</button>';
          const input = node.querySelector('.tab-input');
          input.value = item.url;
          node.querySelector('.tab-form').addEventListener('submit', (event) => {
            event.preventDefault();
            navigate(input.value);
          });
          input.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
              event.preventDefault();
              navigate(input.value);
            }
          });
        } else {
          node.innerHTML = '<button class="tab-open" type="button"><span class="tab-mark"></span><span class="tab-title"></span></button><button class="tab-close" type="button" aria-label="Close tab">×</button>';
          node.querySelector('.tab-title').textContent = item.title;
          node.querySelector('.tab-open').addEventListener('click', () => setActive(item.id));
        }
        node.querySelector('.tab-close').addEventListener('click', (event) => {
          event.stopPropagation();
          closeTab(item.id);
        });
        tabsNode.appendChild(node);
      }
      if (tab) {
        commandInput.value = tab.url;
        backButton.disabled = tab.index <= 0;
        forwardButton.disabled = tab.index >= tab.history.length - 1;
        document.querySelectorAll('[data-url]').forEach((node) => {
          node.classList.toggle('active', node.dataset.url === tab.url);
        });
      }
    }

    async function loadDevice() {
      try {
        const response = await fetch('/api/device');
        const device = await response.json();
        deviceMessage.textContent = `${device.service} ${device.terminal_sessions}pty`;
      } catch {
        deviceMessage.textContent = 'device offline';
      }
    }

    async function sendDeviceAction(action) {
      deviceMessage.textContent = action;
      try {
        const response = await fetch(`/api/device/${action}`, { method: 'POST' });
        const result = await response.json();
        deviceMessage.textContent = result.message || action;
        loadDevice();
      } catch {
        deviceMessage.textContent = `${action} failed`;
      }
    }

    function setZenMode(enabled) {
      document.body.classList.toggle('zen', enabled);
      zenToggle.classList.toggle('active', enabled);
      localStorage.setItem('soliloquy-zen', enabled ? '1' : '0');
      document.activeElement?.blur?.();
    }

    backButton.addEventListener('click', goBack);
    forwardButton.addEventListener('click', goForward);
    reloadButton.addEventListener('click', reload);
    document.getElementById('new-tab').addEventListener('click', () => createTab('os://terminal'));
    document.querySelectorAll('[data-url]').forEach((node) => {
      node.addEventListener('click', () => navigate(node.dataset.url));
    });
    document.querySelectorAll('[data-device-action]').forEach((node) => {
      node.addEventListener('click', () => sendDeviceAction(node.dataset.deviceAction));
    });
    zenToggle.addEventListener('click', () => setZenMode(!document.body.classList.contains('zen')));
    const commandInput = document.getElementById('command-input');
    document.getElementById('command-form').addEventListener('submit', (event) => {
      event.preventDefault();
      navigate(commandInput.value);
    });
    commandInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        navigate(commandInput.value);
      }
    });

    frame.addEventListener('load', () => {
      const tab = activeTab();
      loadBar.classList.remove('loading');
      deviceMessage.textContent = tab ? tab.title : 'ready';
      loadDevice();
    });

    setZenMode(localStorage.getItem('soliloquy-zen') === '1');
    const params = new URLSearchParams(window.location.search);
    createTab(params.get('url') || 'os://terminal');
    loadDevice();
  </script>
</body>
</html>
