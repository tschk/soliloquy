<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Soliloquy</title>
  <style>
    :root {
      color-scheme: dark;
      --text: #ffffff;
      --muted: #a3a3a3;
      --line: rgba(255, 255, 255, 0.12);
      --ring: rgba(255, 255, 255, 0.14) 0px 0px 0px 1px;
      --card: rgba(255,255,255,0.14) 0px 0px 0px 1px, rgba(255,255,255,0.04) 0px 2px 2px, rgba(255,255,255,0.06) 0px 0px 0px 1px inset;
      --focus: hsla(212, 100%, 48%, 1);
    }

    * {
      box-sizing: border-box;
      font-feature-settings: "liga";
    }

    html, body {
      min-height: 100%;
      margin: 0;
      background: #000;
      color: var(--text);
      font-family: Geist, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
    }

    button, input, select {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .top {
      display: grid;
      gap: 12px;
      justify-items: center;
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 7vw, 72px);
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .subhead {
      max-width: 560px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .section {
      border-radius: 8px;
      box-shadow: var(--card);
      background: #000;
    }

    .section.wide {
      grid-column: 1 / -1;
    }

    .section-title {
      padding: 16px;
      box-shadow: var(--ring);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .field {
      display: grid;
      gap: 8px;
      padding: 16px;
    }

    label {
      color: var(--muted);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      height: 38px;
      border: 0;
      border-radius: 6px;
      box-shadow: var(--ring);
      background: #000;
      color: var(--text);
      padding: 0 10px;
      outline: 0;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
    }

    .toggle-copy strong {
      display: block;
      margin-bottom: 4px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .toggle-copy span {
      color: var(--muted);
      font-size: 14px;
    }

    .switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex: 0 0 auto;
    }

    .switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .switch span {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      box-shadow: var(--ring);
    }

    .switch span::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: #525252;
      transition: transform 120ms ease, background 120ms ease;
    }

    .switch input:checked + span::after {
      transform: translateX(18px);
      background: var(--text);
    }

    .device {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: #1f1f1f;
      box-shadow: var(--ring);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 12px;
    }

    .metric {
      background: #000;
      padding: 16px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .metric strong {
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .footer {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .save {
      height: 40px;
      border: 0;
      border-radius: 6px;
      background: var(--text);
      color: #000;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    @media (max-width: 760px) {
      .page {
        padding: 48px 16px;
      }

      .grid,
      .device {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <h1>Settings</h1>
      <p class="subhead">Small runtime switches for the browser appliance.</p>
      <div id="message" class="status">ready</div>
    </header>

    <section class="grid">
      <div class="section">
        <div class="section-title">Appearance</div>
        <div class="field">
          <label for="theme">Theme</label>
          <select id="theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="auto">Auto</option>
          </select>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Performance</div>
        <div class="field">
          <label for="cache-size">Cache MB</label>
          <input id="cache-size" type="number" min="10" max="1000">
        </div>
      </div>

      <div class="section">
        <div class="section-title">Security</div>
        <div class="toggle-row">
          <div class="toggle-copy">
            <strong>JavaScript</strong>
            <span>Allow page scripts.</span>
          </div>
          <label class="switch" aria-label="Enable JavaScript">
            <input id="enable-js" type="checkbox">
            <span></span>
          </label>
        </div>
      </div>

      <div class="section">
        <div class="section-title">General</div>
        <div class="field">
          <label for="homepage">Homepage</label>
          <input id="homepage" type="url" placeholder="os://terminal">
        </div>
      </div>
    </section>

    <section class="device" id="device">
      <div class="metric"><span>service</span><strong>sold</strong></div>
      <div class="metric"><span>uptime</span><strong>0s</strong></div>
      <div class="metric"><span>pty</span><strong>0</strong></div>
      <div class="metric"><span>files</span><strong>ready</strong></div>
    </section>

    <div class="footer">
      <button class="save" type="button" onclick="saveSettings()">Save Settings</button>
    </div>
  </main>

  <script>
    async function loadSettings() {
      try {
        const response = await fetch('/api/settings');
        const settings = await response.json();
        document.getElementById('theme').value = settings.theme || 'dark';
        document.getElementById('cache-size').value = settings.cache_size_mb || 100;
        document.getElementById('enable-js').checked = settings.enable_javascript !== false;
        document.getElementById('homepage').value = settings.homepage || 'os://terminal';
      } catch (error) {
        console.error('Failed to load settings:', error);
        showMessage('load failed');
      }
    }

    async function loadDevice() {
      try {
        const response = await fetch('/api/device');
        const device = await response.json();
        const seconds = Math.round(device.uptime_ms / 1000);
        document.getElementById('device').innerHTML = `
          <div class="metric"><span>service</span><strong>${device.service}</strong></div>
          <div class="metric"><span>uptime</span><strong>${seconds}s</strong></div>
          <div class="metric"><span>pty</span><strong>${device.terminal_sessions}</strong></div>
          <div class="metric"><span>files</span><strong>ready</strong></div>
        `;
      } catch (error) {
        console.error('Failed to load device:', error);
      }
    }

    async function saveSettings() {
      const settings = {
        theme: document.getElementById('theme').value,
        cache_size_mb: parseInt(document.getElementById('cache-size').value) || 100,
        enable_javascript: document.getElementById('enable-js').checked,
        homepage: document.getElementById('homepage').value,
      };

      try {
        const response = await fetch('/api/settings', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(settings)
        });
        showMessage(response.ok ? 'saved' : 'save failed');
      } catch (error) {
        console.error('Failed to save settings:', error);
        showMessage('save failed');
      }
    }

    function showMessage(text) {
      const message = document.getElementById('message');
      message.textContent = text;
      setTimeout(() => { message.textContent = 'ready'; }, 1800);
    }

    loadSettings();
    loadDevice();
  </script>
</body>
</html>
