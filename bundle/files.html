<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Files - Soliloquy</title>
  <style>
    :root {
      color-scheme: dark;
      --text: #ffffff;
      --muted: #a3a3a3;
      --line: rgba(255, 255, 255, 0.12);
      --ring: rgba(255, 255, 255, 0.14) 0px 0px 0px 1px;
      --card: rgba(255,255,255,0.14) 0px 0px 0px 1px, rgba(255,255,255,0.04) 0px 2px 2px, rgba(255,255,255,0.06) 0px 0px 0px 1px inset;
    }

    * {
      box-sizing: border-box;
      font-feature-settings: "liga";
    }

    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      color: var(--text);
      font-family: Geist, Arial, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
      overflow: hidden;
    }

    button, textarea {
      font: inherit;
    }

    button {
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: #000;
      box-shadow: var(--ring);
      color: var(--text);
      padding: 0 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .layout {
      height: 100%;
      display: grid;
      grid-template-columns: 280px 1fr;
    }

    .sidebar {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      box-shadow: var(--ring);
      z-index: 1;
    }

    .header {
      padding: 32px 16px 16px;
    }

    h1 {
      margin: 0;
      font-size: 40px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0;
    }

    .subhead {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
    }

    .file-list {
      min-height: 0;
      overflow: auto;
      padding: 8px;
    }

    .file-item {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
    }

    .file-item:hover,
    .file-item.active {
      box-shadow: var(--ring);
    }

    .file-name {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .file-size {
      color: var(--muted);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
    }

    .workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 56px 1fr;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 16px;
      box-shadow: var(--ring);
      z-index: 1;
    }

    .current-file {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--muted);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
      font-weight: 500;
    }

    .stage,
    #editor,
    #pdf-viewer {
      min-height: 0;
      height: 100%;
    }

    .stage {
      position: relative;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: 0;
      outline: 0;
      resize: none;
      padding: 24px;
      background: #000;
      color: var(--text);
      font: 14px/1.6 "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .empty-state {
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 14px;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 230px 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="header">
        <h1>Files</h1>
        <p class="subhead">Local device storage.</p>
      </div>
      <div class="actions">
        <button type="button" onclick="newFile()">New</button>
        <button type="button" onclick="loadFiles()">Refresh</button>
      </div>
      <div id="file-list" class="file-list"></div>
    </aside>

    <main class="workspace">
      <div class="editor-header">
        <span id="current-file" class="current-file">No file selected</span>
        <button type="button" onclick="saveFile()">Save</button>
      </div>
      <div class="stage">
        <div id="empty-state" class="empty-state">Select a file.</div>
        <div id="editor" class="hidden">
          <textarea id="file-content"></textarea>
        </div>
        <div id="pdf-viewer" class="hidden">
          <iframe id="pdf-frame" title="PDF preview"></iframe>
        </div>
      </div>
    </main>
  </div>

  <script>
    let currentFile = null;

    async function loadFiles() {
      try {
        const response = await fetch('/api/files');
        const files = await response.json();
        const fileList = document.getElementById('file-list');
        fileList.innerHTML = '';

        files.forEach((file) => {
          const div = document.createElement('div');
          div.className = `file-item${file.name === currentFile ? ' active' : ''}`;
          div.innerHTML = '<span class="file-name"></span><span class="file-size"></span>';
          div.querySelector('.file-name').textContent = file.name;
          div.querySelector('.file-size').textContent = `${file.size}b`;
          div.onclick = () => openFile(file.name);
          fileList.appendChild(div);
        });
      } catch (error) {
        console.error('Failed to load files:', error);
      }
    }

    async function openFile(filename) {
      currentFile = filename;
      document.getElementById('current-file').textContent = filename;

      try {
        const response = await fetch(`/api/files/${filename}`);
        if (response.ok) {
          if (filename.toLowerCase().endsWith('.pdf')) {
            const blob = await response.blob();
            showPdfViewer(URL.createObjectURL(blob));
          } else {
            document.getElementById('file-content').value = await response.text();
            showEditor();
          }
          loadFiles();
        }
      } catch (error) {
        console.error('Failed to open file:', error);
      }
    }

    function showEditor() {
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('editor').classList.remove('hidden');
      document.getElementById('pdf-viewer').classList.add('hidden');
    }

    function showPdfViewer(url) {
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('editor').classList.add('hidden');
      document.getElementById('pdf-viewer').classList.remove('hidden');
      document.getElementById('pdf-frame').src = url;
    }

    async function saveFile() {
      if (!currentFile) return;
      try {
        await fetch(`/api/files/${currentFile}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: document.getElementById('file-content').value })
        });
        loadFiles();
      } catch (error) {
        console.error('Failed to save file:', error);
      }
    }

    function newFile() {
      const filename = prompt('Enter filename:');
      if (!filename) return;
      currentFile = filename;
      document.getElementById('current-file').textContent = filename;
      document.getElementById('file-content').value = '';
      showEditor();
      loadFiles();
    }

    loadFiles();
  </script>
</body>
</html>
