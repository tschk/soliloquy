name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  os-appliance:
    name: OS appliance gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check appliance OS policy
        run: scripts/ci-os-appliance.sh

  rust-core:
    name: Rust core gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check Rust core
        run: scripts/ci-rust-core.sh
