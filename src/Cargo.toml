[package]
name = "soliloquy_browser_optimizations"
version = "0.1.0"
edition = "2021"

[lib]
name = "soliloquy_browser_optimizations"
path = "lib.rs"

[[example]]
name = "browser_simulation"
path = "../examples/browser_simulation.rs"

[dependencies]
log = "0.4"

[dev-dependencies]
env_logger = "0.10"

[features]
default = []
# Enable real zstd compression (requires zstd crate dependency)
real_compression = []
