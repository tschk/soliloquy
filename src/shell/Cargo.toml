[package]
name = "soliloquy-shell"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "soliloquy_shell"
path = "lib.rs"

[[bin]]
name = "soliloquy_shell"
path = "main.rs"

[[bin]]
name = "soliloquy_desktop"
path = "main_desktop.rs"
required-features = ["desktop"]

[[bin]]
name = "soliloquy_shell_simple"
path = "main_simple.rs"

[[bin]]
name = "soliloquy_test"
path = "main_test.rs"

[[bin]]
name = "v8_test"
path = "v8_test.rs"

[dependencies]
# Workspace dependencies
log.workspace = true
futures.workspace = true
rusty_v8.workspace = true
tokio = { workspace = true, features = ["full"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
async-trait.workspace = true

# Desktop dependencies (Linux/macOS) - Kept from HEAD
winit = { version = "0.30", optional = true }
wgpu = { version = "26", optional = true }
raw-window-handle = { version = "0.6", optional = true }
gpui = { git = "https://github.com/zed-industries/zed", features = ["test-support"], optional = true }

