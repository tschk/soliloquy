fuchsia_input = { path = "../../gen/fidl/fuchsia_input", optional = true }

# Networking dependencies
quinn = "0.11"
rustls = "0.23"
hyper = { version = "1.4", features = ["client", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["client", "http1", "http2"] }
http-body-util = "0.1"
h3 = "0.0.6"
h3-quinn = "0.0.7"

# Crypto and hashing
sha2 = "0.10"
rand = "0.8"

# Data structures
lru = "0.12"

# URL parsing
url = "2.5"

# Time utilities
chrono = "0.4"

# Glob pattern matching
glob = "0.3"

[target.'cfg(target_os = "linux")'.dependencies]
# Linux-specific dependencies
x11rb = { version = "0.13", optional = true }
wayland-client = { version = "0.31", optional = true }

[dev-dependencies]
tokio-test.workspace = true
env_logger.workspace = true

[features]
default = ["desktop"]
desktop = [
    "winit",
    "wgpu",
    "raw-window-handle",
    "tokio",
    "gpui",
]
fuchsia = [
    "fuchsia-async",
    "fuchsia-component",
    "fuchsia-syslog",
    "fuchsia-zircon",
    "fuchsia_ui_composition",
    "fuchsia_ui_views",
    "fuchsia_ui_app",
    "fuchsia_input",
    "fidl",
]
gpui = ["dep:gpui"]
x11 = ["x11rb"]
wayland = ["wayland-client"]
